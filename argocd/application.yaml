apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: imdb-mlops-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/PINJALA780/mlops-imdb-rating-platform.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
