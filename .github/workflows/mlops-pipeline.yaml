name: IMDb MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Setup Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 4. Build AND PUSH Docker image (FIXED)
    - name: Build and Push Docker image
      run: |
        docker buildx build \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/imdb-rating-api:latest \
          --push \
          .

    # 5. Update Kubernetes deployment image
    - name: Update Kubernetes manifest
      run: |
        sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/imdb-rating-api:latest|g" k8s/deployment.yaml

    # 6. Commit updated manifest back to repo (for ArgoCD)
    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add k8s/deployment.yaml
        git commit -m "update image tag [skip ci]" || echo "No changes"
        git push
